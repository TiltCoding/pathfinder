<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Process diagram — a tool call becomes a span</title>
<style>
  :root{ --bg:#0f1115; --ink:#e7e9ee; --soft:#9aa3b2; --line:#2a2f3a;
         --a:#6ea8fe; --b:#7ee0c0; --c:#f3c969; }
  body{margin:0;background:var(--bg);color:var(--ink);
       font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;padding:22px}
  h1{font-size:18px;margin:0 0 2px}
  .sub{color:var(--soft);margin:0 0 16px;font-size:13px}
  svg{width:100%;height:auto;max-width:640px}
  .lbl{fill:var(--ink);font:13px -apple-system,Segoe UI,Roboto,sans-serif}
  .lbl.s{fill:var(--soft);font-size:11px}
  .box{fill:#171a21;stroke:var(--line);stroke-width:1.5}
  .edge{stroke:var(--soft);stroke-width:1.5;fill:none;marker-end:url(#arr)}
</style>
</head>
<body>
  <h1>How a tool call becomes a span</h1>
  <p class="sub">The path from an agent action to a bar on the Tracing tab.</p>
  <svg viewBox="0 0 640 430" xmlns="http://www.w3.org/2000/svg" role="img"
       aria-label="Process diagram of a tool call becoming a trace span">
    <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
        <path d="M0 0L10 5L0 10z" fill="#9aa3b2"/>
      </marker>
    </defs>

    <rect class="box" x="200" y="14"  width="240" height="52" rx="10"/>
    <text class="lbl"   x="320" y="38" text-anchor="middle">Agent calls a tool</text>
    <text class="lbl s" x="320" y="55" text-anchor="middle">Bash / Read / Task …</text>

    <rect class="box" x="200" y="104" width="240" height="52" rx="10" stroke="#6ea8fe"/>
    <text class="lbl"   x="320" y="128" text-anchor="middle">Hook fires → tool.start</text>
    <text class="lbl s" x="320" y="145" text-anchor="middle">toolUseId, spanId, kind, arg</text>

    <rect class="box" x="200" y="194" width="240" height="52" rx="10" stroke="#7ee0c0"/>
    <text class="lbl"   x="320" y="218" text-anchor="middle">Append line to telemetry.jsonl</text>
    <text class="lbl s" x="320" y="235" text-anchor="middle">exit 0 — never blocks the agent</text>

    <rect class="box" x="200" y="284" width="240" height="52" rx="10" stroke="#f3c969"/>
    <text class="lbl"   x="320" y="308" text-anchor="middle">Server pairs start ↔ end</text>
    <text class="lbl s" x="320" y="325" text-anchor="middle">/trace/feed, delta from cursor</text>

    <rect class="box" x="200" y="374" width="240" height="44" rx="10"/>
    <text class="lbl"   x="320" y="401" text-anchor="middle">Bar on the Tracing timeline</text>

    <path class="edge" d="M320 66 L320 104"/>
    <path class="edge" d="M320 156 L320 194"/>
    <path class="edge" d="M320 246 L320 284"/>
    <path class="edge" d="M320 336 L320 374"/>

    <text class="lbl s" x="455" y="135">on end: tool.end + ok</text>
    <path class="edge" d="M440 130 q40 40 0 80" />
  </svg>
</body>
</html>
